  PortfolioAccessRole:
    Condition: AutoAddPortfolioAccessEnabled
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: portfolio-access-logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteFunctionLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-portfolio-access:*
        - PolicyName: portfolio-access-servicecatalog
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ListAndAssociate
                Effect: Allow
                Action:
                  - servicecatalog:ListPortfolios
                  - servicecatalog:SearchProvisionedProducts
                  - servicecatalog:DescribeProvisionedProduct
                  - servicecatalog:ListLaunchPaths
                  - servicecatalog:ListPrincipalsForPortfolio
                  - servicecatalog:AssociatePrincipalWithPortfolio
                  - servicecatalog:DisassociatePrincipalFromPortfolio
                Resource: "*"
        - PolicyName: portfolio-access-iam-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: GetEngineRole
                Effect: Allow
                Action:
                  - iam:GetRole
                Resource: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${AWS::StackName}-OUBaselineAutomationRole-*

  PortfolioAccessLogGroup:
    Condition: AutoAddPortfolioAccessEnabled
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-portfolio-access
      RetentionInDays: 30

  PortfolioAccessFunction:
    Condition: AutoAddPortfolioAccessEnabled
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-portfolio-access
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt PortfolioAccessRole.Arn
      Timeout: 900
      MemorySize: 512
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref PortfolioAccessLogGroup
      Code:
        ZipFile: |
          import json
          import logging
          import threading
          import time
          import urllib.request

          import boto3
          from botocore.config import Config
          from botocore.exceptions import ClientError

          log = logging.getLogger()
          log.setLevel(logging.INFO)

          CFG = Config(retries={"max_attempts": 10, "mode": "standard"})

          _RESPONDED = False
          _LOCK = threading.Lock()


          def _cfn_send(event, context, status: str, reason: str = "", data: dict | None = None, physical_id: str | None = None):
              global _RESPONDED

              resp_url = (event or {}).get("ResponseURL")
              if not resp_url:
                  return

              body = {
                  "Status": status,
                  "Reason": (reason or f"See CloudWatch Logs: {context.log_stream_name}")[:1024],
                  "PhysicalResourceId": physical_id or event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event.get("StackId"),
                  "RequestId": event.get("RequestId"),
                  "LogicalResourceId": event.get("LogicalResourceId"),
                  "NoEcho": False,
                  "Data": data or {},
              }
              payload = json.dumps(body).encode("utf-8")

              with _LOCK:
                  if _RESPONDED:
                      return

                  deadline = time.time() + max((context.get_remaining_time_in_millis() / 1000.0) - 1.5, 1.0)
                  attempt = 0
                  last_err = None

                  while time.time() < deadline:
                      attempt += 1
                      try:
                          req = urllib.request.Request(
                              resp_url,
                              data=payload,
                              method="PUT",
                              headers={"Content-Type": "", "Content-Length": str(len(payload))},
                          )
                          with urllib.request.urlopen(req, timeout=10) as r:
                              r.read()

                          _RESPONDED = True
                          return
                      except Exception as e:
                          last_err = e
                          sleep_s = min(2 ** min(attempt, 5), 10)
                          log.warning("CFN response attempt %d failed: %s (sleep %.1fs)", attempt, str(e), sleep_s)
                          time.sleep(sleep_s)

                  log.error("CFN response could not be delivered before timeout window. Last error: %s", str(last_err))


          def _first(props: dict, *keys: str) -> str:
              for k in keys:
                  v = props.get(k)
                  if v is not None and str(v).strip():
                      return str(v).strip()
              return ""


          def _lookup_product_id_for_target(sc, account_id: str) -> str | None:
              if not account_id:
                  return None
              resp = sc.search_provisioned_products(Filters={"SearchQuery": [f"physicalId:{account_id}"]})
              pps = resp.get("ProvisionedProducts", []) or []
              if not pps:
                  return None
              pps.sort(key=lambda x: x.get("CreatedTime") or 0, reverse=True)
              return pps[0].get("ProductId")


          def _portfolio_from_launch_paths(sc, product_id: str) -> str | None:
              try:
                  resp = sc.list_launch_paths(ProductId=product_id)
                  summaries = resp.get("LaunchPathSummaries", []) or []
                  if summaries:
                      summaries.sort(key=lambda x: (x.get("PortfolioId") or ""))
                      return summaries[0].get("PortfolioId")
              except ClientError as e:
                  code = (e.response.get("Error") or {}).get("Code", "")
                  log.warning("ListLaunchPaths failed for product %s: %s", product_id, code)
              return None


          def _portfolio_fallback_by_name(sc, name_contains: str) -> str | None:
              token = None
              target = (name_contains or "").strip().lower()
              contains_matches = []

              while True:
                  kwargs = {"PageSize": 20}
                  if token:
                      kwargs["PageToken"] = token
                  resp = sc.list_portfolios(**kwargs)
                  for p in (resp.get("PortfolioDetails", []) or []):
                      dn = (p.get("DisplayName") or "").strip()
                      dnl = dn.lower()
                      if target and dnl == target:
                          return p.get("Id")
                      if target and target in dnl:
                          contains_matches.append((dn, p.get("Id")))
                  token = resp.get("NextPageToken")
                  if not token:
                      break

              if len(contains_matches) == 1:
                  return contains_matches[0][1]

              if contains_matches:
                  contains_matches.sort(key=lambda x: x[0])
                  log.warning("Multiple portfolio name matches found for %s: %s", name_contains, [x[0] for x in contains_matches])
                  return contains_matches[0][1]

              return None


          def _principal_visible_for_portfolio(sc, portfolio_id: str, principal_arn: str) -> bool:
              token = None
              while True:
                  kwargs = {"PortfolioId": portfolio_id, "PageSize": 20}
                  if token:
                      kwargs["PageToken"] = token
                  resp = sc.list_principals_for_portfolio(**kwargs)
                  for pr in (resp.get("Principals", []) or []):
                      if (pr.get("PrincipalARN") or "").strip() == principal_arn:
                          return True
                  token = resp.get("NextPageToken")
                  if not token:
                      return False


          def _wait_for_principal_association(sc, portfolio_id: str, principal_arn: str, timeout_seconds: int = 90):
              deadline = time.time() + timeout_seconds
              while time.time() < deadline:
                  if _principal_visible_for_portfolio(sc, portfolio_id, principal_arn):
                      return True
                  time.sleep(3)
              return False


          def lambda_handler(event, context):
              global _RESPONDED
              _RESPONDED = False

              req_type = (event.get("RequestType") or "").strip()
              props = event.get("ResourceProperties") or {}

              principal_arn = _first(props, "PrincipalArn", "EngineRoleArn")
              portfolio_id = _first(props, "PortfolioId")
              target_account_id = _first(props, "TargetAccountId")
              name_contains = _first(props, "PortfolioNameContains") or "AWS Control Tower Account Factory Portfolio"

              physical_id = event.get("PhysicalResourceId") or context.log_stream_name

              def _timeout_fail():
                  if not _RESPONDED:
                      _cfn_send(event, context, "FAILED", "Timed out before sending CloudFormation response", physical_id=physical_id)

              timer = threading.Timer(max((context.get_remaining_time_in_millis() / 1000.0) - 2.0, 1.0), _timeout_fail)
              timer.daemon = True
              timer.start()

              sc = boto3.client("servicecatalog", config=CFG)

              try:
                  startup_delay_seconds = int(_first(props, "StartupDelaySeconds") or "0")

                  if req_type in ("Create", "Update") and startup_delay_seconds > 0:
                      log.info(
                          "Waiting %s seconds before processing %s to allow IAM role and policy propagation",
                          startup_delay_seconds,
                          event.get("LogicalResourceId"),
                      )
                      time.sleep(startup_delay_seconds)

                  sc = boto3.client("servicecatalog", config=CFG)

                  if not principal_arn:
                      raise Exception("Missing required property: PrincipalArn (or EngineRoleArn)")
                  if not portfolio_id and target_account_id:
                      product_id = _lookup_product_id_for_target(sc, target_account_id)
                      if product_id:
                          portfolio_id = _portfolio_from_launch_paths(sc, product_id)

                  if not portfolio_id:
                      portfolio_id = _portfolio_fallback_by_name(sc, name_contains)

                  if not portfolio_id:
                      raise Exception("Unable to determine Account Factory portfolio id")

                  phys_id = f"{portfolio_id}|{principal_arn}"

                  if req_type in ("Create", "Update"):
                      try:
                          sc.associate_principal_with_portfolio(
                              PortfolioId=portfolio_id,
                              PrincipalARN=principal_arn,
                              PrincipalType="IAM",
                          )
                      except ClientError as e:
                          code = (e.response.get("Error") or {}).get("Code", "")
                          if code not in ("DuplicateResourceException", "ResourceInUseException"):
                              raise

                      if not _wait_for_principal_association(sc, portfolio_id, principal_arn, timeout_seconds=90):
                          raise Exception(f"Principal {principal_arn} did not become visible on portfolio {portfolio_id} before timeout")

                      _cfn_send(event, context, "SUCCESS", "OK", data={"PortfolioId": portfolio_id, "PrincipalArn": principal_arn}, physical_id=phys_id)
                      return

                  if req_type == "Delete":
                      pid = portfolio_id
                      parn = principal_arn
                      prior = event.get("PhysicalResourceId") or ""
                      if "|" in prior:
                          pid, parn = prior.split("|", 1)

                      try:
                          sc.disassociate_principal_from_portfolio(
                              PortfolioId=pid,
                              PrincipalARN=parn,
                          )
                      except ClientError as e:
                          code = (e.response.get("Error") or {}).get("Code", "")
                          if code not in ("ResourceNotFoundException", "ResourceInUseException", "InvalidParametersException"):
                              raise
                      _cfn_send(event, context, "SUCCESS", "OK", data={"PortfolioId": pid, "PrincipalArn": parn}, physical_id=phys_id)
                      return

                  raise Exception(f"Unsupported RequestType: {req_type}")
              except ClientError as e:
                  err = e.response.get("Error") or {}
                  code = err.get("Code", "Unknown")
                  msg = err.get("Message", "")
                  _cfn_send(event, context, "FAILED", f"{code}: {msg}", physical_id=physical_id)
              except Exception as e:
                  log.exception("PortfolioAccessFunction failed")
                  _cfn_send(event, context, "FAILED", str(e), physical_id=physical_id)
              finally:
                  try:
                      timer.cancel()
                  except Exception:
                      pass

  AutoAddOUEngineRoleToAccountFactoryPortfolio:
    Condition: AutoAddPortfolioAccessEnabled
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - AllowCloudFormationInvokePortfolioAccess
    Properties:
      ServiceToken: !GetAtt PortfolioAccessFunction.Arn
      PrincipalArn: !GetAtt OUBaselineAutomationRole.Arn
      StartupDelaySeconds: 60
      PortfolioNameContains: AWS Control Tower Account Factory Portfolio

  OrganizationalUnitsTagsCleanupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: OrganizationalUnitsTagsCleanupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Sid: OrganizationsCleanup
                Effect: Allow
                Action:
                  - organizations:ListRoots
                  - organizations:ListOrganizationalUnitsForParent
                  - organizations:DescribeOrganizationalUnit
                  - organizations:UntagResource
                Resource: '*'

  OrganizationalUnitsTagsCleanupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-organizational-units-tags-cleanup
      RetentionInDays: 30

  OrganizationalUnitsTagsCleanupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Role: !GetAtt OrganizationalUnitsTagsCleanupRole.Arn
      Runtime: python3.13
      Handler: index.lambda_handler
      Timeout: 900
      MemorySize: 512
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref OrganizationalUnitsTagsCleanupLogGroup
      Environment:
        Variables:
          TAG_STARTED: !Ref TagStartedKey
          TAG_COMPLETED: !Ref TagCompletedKey
      Code:
        ZipFile: |
          import logging
          import os

          import boto3
          from botocore.config import Config
          from botocore.exceptions import ClientError

          log = logging.getLogger()
          log.setLevel(logging.INFO)

          TAG_STARTED = os.environ.get("TAG_STARTED", "ResetEnabledBaselineStart")
          TAG_COMPLETED = os.environ.get("TAG_COMPLETED", "ResetEnabledBaselineComplete")

          CFG = Config(
              retries={"max_attempts": 10, "mode": "adaptive"},
              connect_timeout=10,
              read_timeout=120,
          )

          def _org_client():
              return boto3.client("organizations", config=CFG)

          def _iter_ou_ids(org):
              roots = org.list_roots().get("Roots", []) or []
              paginator = org.get_paginator("list_organizational_units_for_parent")

              def walk(parent_id):
                  for page in paginator.paginate(ParentId=parent_id):
                      for ou in page.get("OrganizationalUnits", []) or []:
                          yield ou["Id"]
                          for child in walk(ou["Id"]):
                              yield child

              for root in roots:
                  for ou_id in walk(root["Id"]):
                      yield ou_id

          def lambda_handler(event, context):
              org = _org_client()
              processed = 0
              cleaned = 0
              errors = []

              for ou_id in _iter_ou_ids(org):
                  processed += 1
                  try:
                      org.untag_resource(
                          ResourceId=ou_id,
                          TagKeys=[TAG_STARTED, TAG_COMPLETED],
                      )
                      cleaned += 1
                      log.info("Removed automation tags from OU %s", ou_id)
                  except ClientError as e:
                      code = (e.response.get("Error") or {}).get("Code", "")
                      if code in ("OrganizationalUnitNotFoundException", "AWSOrganizationsNotInUseException"):
                          log.warning("Skipping OU %s because it is not available: %s", ou_id, code)
                          continue
                      errors.append({"ou_id": ou_id, "error": str(e)})
                      log.exception("Failed to remove automation tags from OU %s", ou_id)

              return {
                  "status": "completed",
                  "processed_ou_count": processed,
                  "cleanup_attempt_count": cleaned,
                  "tag_keys": [TAG_STARTED, TAG_COMPLETED],
                  "error_count": len(errors),
                  "errors": errors[:25],
              }

